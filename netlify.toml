[build]
  command = "hugo --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.163.3"

# Les pages du CMS ne doivent pas être mises en cache agressivement
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache"

# La PWA de saisie gère son propre cache (service worker) : no-cache côté CDN
# pour que sw.js et le shell se mettent à jour dès le déploiement
[[headers]]
  for = "/app/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
