baseURL: 'https://toutelacuisine.com'
title: 'TouteLaCuisine.com'
locale: 'fr-FR'
defaultContentLanguage: 'fr'

params:
  description: 'Recettes de cuisine partagées par la communauté depuis 2008'
  author: 'TouteLaCuisine'

menu:
  main:
    - name: 'Accueil'
      url: '/'
      weight: 1
    - name: 'Recettes'
      url: '/recettes/'
      weight: 2
    - name: 'Nos Cuisiniers'
      url: '/users/'
      weight: 3

taxonomies:
  category: 'categories'
  tag: 'tags'

pagination:
  pagerSize: 12

enableRobotsTXT: true

markup:
  goldmark:
    renderer:
      unsafe: false
